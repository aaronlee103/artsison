<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Art Sison — Opening Soon</title>
  <meta name="description" content="Art Sison — a curated gallery of collectable art. Opening soon.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f0e8;
      --paper: #fbf8f2;
      --ink: #1c1a16;
      --ink-soft: #3d3830;
      --ink-mute: #8a7f6e;
      --accent: #a65b3c;
      --line: rgba(0,0,0,0.12);
      --line-soft: rgba(0,0,0,0.06);
      --serif: "Cormorant Garamond", Georgia, serif;
      --sans: "Inter", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      --mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    body {
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
      -webkit-text-size-adjust: 100%;
      background:
        radial-gradient(ellipse at 50% 20%, rgba(255,240,220,0.4), transparent 60%),
        radial-gradient(ellipse at 80% 90%, rgba(166,91,60,0.05), transparent 55%),
        var(--bg);
    }
    ::selection { background: var(--ink); color: var(--paper); }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse at 30% 10%, rgba(255,255,255,0.08), transparent 50%),
        radial-gradient(ellipse at 70% 90%, rgba(0,0,0,0.03), transparent 60%);
      z-index: 0;
    }

    .shell {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: 28px clamp(20px, 5vw, 60px);
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: clamp(40px, 8vh, 80px);
    }
    .brand {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }
    .mark {
      font-size: 14px;
      color: var(--accent);
      transform: translateY(-1px);
    }
    .brand-name {
      font-family: var(--serif);
      font-size: clamp(18px, 2.4vw, 22px);
      font-weight: 500;
      letter-spacing: 0.01em;
    }
    .status {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink-mute);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; transform: scale(0.9); }
      50% { opacity: 1; transform: scale(1.15); }
    }

    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      max-width: 880px;
      margin: 0 auto;
      width: 100%;
      padding: clamp(20px, 6vh, 60px) 0;
    }
    .eyebrow {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--ink-mute);
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: clamp(24px, 4vh, 40px);
    }
    .eyebrow::before {
      content: "";
      width: 28px;
      height: 1px;
      background: var(--ink);
    }
    .headline {
      font-family: var(--serif);
      font-weight: 300;
      font-size: clamp(44px, 10vw, 120px);
      line-height: 0.95;
      letter-spacing: -0.015em;
      margin-bottom: clamp(20px, 3vh, 32px);
    }
    .headline .amp {
      color: var(--accent);
      font-style: italic;
      font-weight: 300;
    }
    .tagline {
      font-family: var(--serif);
      font-size: clamp(18px, 2.6vw, 24px);
      font-weight: 300;
      font-style: italic;
      color: var(--ink-soft);
      line-height: 1.35;
      max-width: 640px;
      margin-bottom: clamp(32px, 5vh, 56px);
    }
    .tagline span {
      color: var(--ink-mute);
    }

    .meta-row {
      display: grid;
      grid-template-columns: repeat(3, auto);
      gap: clamp(28px, 5vw, 56px);
      padding-top: clamp(28px, 4vh, 40px);
      border-top: 1px solid var(--line-soft);
      width: 100%;
      max-width: 640px;
    }
    .meta-item {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .meta-label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--ink-mute);
    }
    .meta-value {
      font-family: var(--serif);
      font-size: clamp(16px, 2vw, 18px);
      color: var(--ink);
    }

    .bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 40px;
      gap: 20px;
      flex-wrap: wrap;
    }
    .copy {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--ink-mute);
    }
    .location {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-mute);
    }

    @media (max-width: 560px) {
      .top { padding-bottom: 32px; }
      .meta-row { grid-template-columns: 1fr 1fr; gap: 20px 24px; }
      .bottom { flex-direction: column; align-items: flex-start; gap: 10px; padding-top: 28px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="top">
      <div class="brand">
        <span class="mark" aria-hidden="true">&#9670;</span>
        <span class="brand-name">Art Sison</span>
      </div>
      <div class="status">Opening Soon</div>
    </header>

    <main class="hero">
      <div class="eyebrow">Est. 2026</div>
      <h1 class="headline">
        Collectable art,<br>
        <span class="amp">lived</span> with.
      </h1>
      <p class="tagline">
        A small, carefully curated gallery of original works and limited editions &mdash;
        <span>opening its doors later this year.</span>
      </p>

      <div class="meta-row">
        <div class="meta-item">
          <span class="meta-label">Launching</span>
          <span class="meta-value">Summer 2026</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Studio</span>
          <span class="meta-value">Seoul, KR</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Contact</span>
          <span class="meta-value">hello@artsison.com</span>
        </div>
      </div>
    </main>

    <footer class="bottom">
      <div class="copy">&copy; 2026 Art Sison</div>
      <div class="location">www.artsison.com</div>
    </footer>
  </div>
</body>
</html>
