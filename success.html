<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Thank you · artsison</title>
<style>
  :root { --bg:#f4f0e8; --paper:#faf6ee; --ink:#1a1814; --ink-soft:#4a4640; --ink-mute:#8a8478; --line:#d9d2c2; --accent:#8a7a55; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); font: 16px/1.6 -apple-system,BlinkMacSystemFont,"Inter",sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
  .card { max-width:560px; width:100%; background:var(--paper); border:1px solid var(--line); padding:48px 40px; text-align:center; }
  h1 { font-family:"Cormorant Garamond","Times New Roman",serif; font-weight:300; font-size:42px; letter-spacing:-.01em; margin:0 0 12px; }
  p { color:var(--ink-soft); margin:0 0 10px; }
  .ref { font-family: ui-monospace, "SF Mono", monospace; font-size:12px; letter-spacing:.08em; color:var(--ink-mute); margin:18px 0 26px; }
  a.btn { display:inline-block; padding:12px 22px; border:1px solid var(--ink); color:var(--ink); text-decoration:none; font:12px/1 -apple-system,sans-serif; letter-spacing:.12em; text-transform:uppercase; }
  a.btn:hover { background:var(--ink); color:var(--paper); }
  .mini { font-size:12px; color:var(--ink-mute); margin-top:28px; }
</style>
</head>
<body>
  <div class="card">
    <h1>Thank you.</h1>
    <p>Your order is in. We'll send a confirmation shortly.</p>
    <p>Each piece is printed to order and packed carefully — expect shipping in 7–10 days.</p>
    <div class="ref" id="ref"></div>
    <a class="btn" href="/preview">Keep browsing</a>
    <div class="mini">Questions? Email <a href="mailto:hello@artsison.com">hello@artsison.com</a></div>
  </div>
  <script>
    const p = new URLSearchParams(location.search);
    const id = p.get('order');
    if (id) document.getElementById('ref').textContent = 'Order: ' + id;
    try { localStorage.removeItem('artsison:cart'); } catch {}
  </script>
</body>
</html>
