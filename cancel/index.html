<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Checkout cancelled · artsison</title>
<style>
  :root { --bg:#f4f0e8; --paper:#faf6ee; --ink:#1a1814; --ink-soft:#4a4640; --ink-mute:#8a8478; --line:#d9d2c2; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); font: 16px/1.6 -apple-system,BlinkMacSystemFont,"Inter",sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
  .card { max-width:520px; width:100%; background:var(--paper); border:1px solid var(--line); padding:44px 38px; text-align:center; }
  h1 { font-family:"Cormorant Garamond",serif; font-weight:300; font-size:38px; letter-spacing:-.01em; margin:0 0 12px; }
  p { color:var(--ink-soft); margin:0 0 24px; }
  a.btn { display:inline-block; padding:12px 22px; border:1px solid var(--ink); color:var(--ink); text-decoration:none; font:12px/1 -apple-system,sans-serif; letter-spacing:.12em; text-transform:uppercase; margin:4px; }
  a.btn.primary { background:var(--ink); color:var(--paper); }
</style>
</head>
<body>
  <div class="card">
    <h1>No charge.</h1>
    <p>Your cart is still saved. Pick up where you left off.</p>
    <a class="btn primary" href="/preview">Back to cart</a>
    <a class="btn" href="/preview">Keep browsing</a>
  </div>
</body>
</html>
